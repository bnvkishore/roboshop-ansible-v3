- name: Roboshop instances management
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "shipping", "payment", "frontend"]
    domain_name: "daws90.shop"
    image_id: ami-0220d79f3f480ecf5
    action_type: "create"
  tasks:
  - name: debug action type
    debug:
      msg: "action type is:{{ action_type }}"
  - name: create ec2 instances
    amazon.aws.ec2_instance:
      name: "roboshop-{{ item }}"
      instance_type: t3.micro
      image_id: "{{ image_id }}"
      security_groups: 
      - roboshop-{{ item }}
      - roboshop-common
    loop: "{{ instances }}"
    register: ec2_output
    when: action_type == "create"
  
  - name: create route53 records
    amazon.aws.route53:
      state: "present"
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: action_type == "create"
  
  - name: create route53 record for frontend
    amazon.aws.route53:
      state: "present"
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: 
    - action_type == "create"
    - item.item == "frontend"

  - name: Delete route53 records
    amazon.aws.route53:
      state: "absent"
      zone: "{{ domain_name }}"
      record: "{{ item}}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when:
    - action_type == "destroy"
  
  - name: Delete route53 record for frontend
    amazon.aws.route53:
      state: "absent"
      zone: "{{ domain_name }}"
      record: "{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when:
    - action_type == "destroy"
    - item == "frontend"

  - name: destroy ec2 instances
    amazon.aws.ec2_instance:
      state: absent
      name: "roboshop-{{ item }}"
      wait: false
    loop: "{{ instances }}"
    when: action_type == "destroy"